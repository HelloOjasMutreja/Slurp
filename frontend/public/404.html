<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Slurp</title>
    <script>
      // Single Page Apps for GitHub Pages — https://github.com/rafgraph/spa-github-pages
      // Redirects the browser to the index page with the requested path encoded in the
      // query string so the SPA router can restore it after loading.
      var pathSegmentsToKeep = 1; // 1 for project pages (e.g. /Slurp), 0 for user/org pages
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
